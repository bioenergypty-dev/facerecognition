<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Vigilancia Facial</title>
<style>
*{box-sizing:border-box;}
body{
  background: url('/static/vigilancia_bg.jpg') no-repeat center fixed;
  background-size: cover;
  font-family:'Segoe UI', sans-serif;
  color:white;
  text-align:center;
  margin:0;
  padding:10px;
}
.panel{
  background: rgba(0,0,0,0.85);
  max-width: 500px;
  margin: 20px auto;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 8px 16px rgba(0,0,0,0.5);
}
h2{margin:10px 0 20px 0;font-size:24px;}
input{
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border:none;
  border-radius:6px;
  font-size:16px;
}
button{
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  font-weight:bold;
  cursor:pointer;
  background: cyan;
  color:black;
  transition:0.3s;
  border: none;
  border-radius: 6px;
  font-size: 16px;
}
button:hover{background: deepskyblue;}
#reintentar{background:orange;color:black;display:none;}
#reintentar:hover{background:darkorange;}
video,canvas{
  width:100%;
  border:2px solid cyan;
  border-radius:10px;
  margin-top:15px;
  max-height: 80vh;
}
#estado{font-weight:bold;margin:15px 0;font-size:14px;}
@media(max-width:600px){
  .panel{padding:15px;margin:15px auto;}
  h2{font-size:20px;}
  input,button{font-size:14px;padding:10px;}
}
</style>
</head>
<body>
<div class="panel">
<h2>🛡️ Vigilancia</h2>
<input id="usuario" placeholder="Usuario">
<button onclick="accion('ENTRADA')">⬅ ENTRADA</button>
<button onclick="accion('SALIDA')">➡ SALIDA</button>
<button id="reintentar" onclick="iniciarCamara()">🔄 Reintentar Acceso a Cámara</button>
<p id="estado">🎥 Iniciando cámara...</p>
<video id="v" autoplay playsinline muted></video>
<canvas id="c" style="display:none;"></canvas>
</div>
<script>
const v=document.getElementById("v"),c=document.getElementById("c"),ctx=c.getContext("2d"),estado=document.getElementById("estado"),usuario=document.getElementById("usuario"),reintentar=document.getElementById("reintentar");

function iniciarCamara(){
  estado.innerText="📷 Solicitando acceso a cámara...";
  reintentar.style.display="none";
  navigator.mediaDevices.getUserMedia({
    video:{width:{ideal:1280},height:{ideal:720},facingMode:"user"},
    audio:false
  }).then(s=>{
    v.srcObject=s;
    estado.innerText="✅ Cámara lista - Seleccione ENTRADA o SALIDA";
    console.log("Cámara iniciada correctamente");
  }).catch(err=>{
    estado.innerText="❌ Error: "+err.name+" - "+err.message;
    reintentar.style.display="block";
    console.error("Error de cámara:",err);
    if(err.name==="NotAllowedError") estado.innerText="❌ Permiso denegado. Haga clic en 'Reintentar' después de conceder permiso en el navegador.";
    if(err.name==="NotFoundError") estado.innerText="❌ No se encontró cámara. Conecte una cámara USB.";
  });
}

iniciarCamara();

async function accion(e){
 if(!v.srcObject) {estado.innerText="❌ Cámara no disponible"; return;}
 c.width=v.videoWidth;c.height=v.videoHeight;ctx.drawImage(v,0,0);
 const res=await fetch("/vig_procesar",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({usuario:usuario.value,evento:e,frame:c.toDataURL("image/jpeg")})});
 const d=await res.json();
 estado.innerText=d.estado;
 if(d.puntos){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle="cyan";d.puntos.forEach(p=>ctx.fillRect(p[0],p[1],2,2));}
}
</script>
</body>
</html>
